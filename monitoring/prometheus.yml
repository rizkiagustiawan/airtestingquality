global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "airq-webgis"
    metrics_path: /metrics
    static_configs:
      - targets: ["webgis:8000"]
