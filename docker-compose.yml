version: "3.8"

services:
  webgis:
    build: .
    container_name: airq_webgis
    ports:
      - "80:8000"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - CORS_ALLOW_CREDENTIALS=${CORS_ALLOW_CREDENTIALS}
      - RETENTION_DAYS=${RETENTION_DAYS}
      - AUTH_ENABLED=${AUTH_ENABLED}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_SECRETS=${JWT_SECRETS}
      - JWT_ACTIVE_KID=${JWT_ACTIVE_KID}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - VIEWER_USERNAME=${VIEWER_USERNAME}
      - VIEWER_PASSWORD=${VIEWER_PASSWORD}
      - MIN_ACCEPTABLE_VALID_RATE_PCT=${MIN_ACCEPTABLE_VALID_RATE_PCT}
      - ALERT_CHANNELS=${ALERT_CHANNELS}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO}
      - ALERT_DISPATCH_KEY=${ALERT_DISPATCH_KEY}

  db:
    image: postgis/postgis:15-3.3
    container_name: airq_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: airq_redis
    restart: always
    ports:
      - "6379:6379"

  celery_worker:
    profiles: ["async"]
    build: .
    container_name: airq_celery_worker
    command: python -m celery -A backend.worker.celery_app worker --loglevel=info
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - SECRET_KEY=${SECRET_KEY}

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: airq_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    depends_on:
      - webgis
      - alertmanager

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: airq_alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager

  grafana:
    image: grafana/grafana:11.2.2
    container_name: airq_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  pgdata:
  grafana-data:
  alertmanager-data:
